<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games | Online Arcade</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/"><div class="brand-icon">🕹</div>ONLINE <span>ARCADE</span></a>
      <div class="menu">
        <a href="/games">Games</a>
        <a href="/leaderboards">Leaderboards</a>
        <a href="/tournaments">Tournaments</a>
        <button class="nav-user-btn" id="nav-user-btn">Log In</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="page-head fade-up">
      <div><h1>Game Library</h1><p>Browse and play all available games</p></div>
    </section>

    <div class="search-wrap fade-up-2">
      <input class="search-input" type="search" id="game-search" placeholder="Search games…" autocomplete="off" />
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="published">Published</button>
        <button class="chip" data-filter="high-score">High Score</button>
      </div>
    </div>

    <div class="grid fade-up-3" id="games-list">
      <div class="empty"><div class="empty-icon">🎮</div><p>Loading games…</p></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner"><span class="footer-brand">🕹 ONLINE ARCADE</span></div>
  </footer>

  <script src="/js/app.js"></script>
  <script>ArcadeApp.loadGamesPage().catch(console.error);</script>
</body>
</html>
